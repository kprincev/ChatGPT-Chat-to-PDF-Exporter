<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>😇HappyPrince😇</title>
  <style>
    /* Professional Dark Theme Styling */
    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      padding: 20px;
      width: 250px; /* Thoda width badhaya hai taaki premium lage */
      background-color: #212121;
      color: #ffffff;
      margin: 0;
      text-align: center;
    }

    h3 {
      font-size: 18px;
      margin-top: 0;
      margin-bottom: 20px;
      font-weight: 600;
      color: #ececec;
      letter-spacing: 0.5px;
    }

    button {
      width: 100%;
      padding: 12px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      background-color: #10a37f; /* ChatGPT Green */
      color: white;
      border: none;
      border-radius: 8px;
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    button:hover {
      background-color: #0d8a6c;
      transform: translateY(-1px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
    }

    button:active {
      transform: translateY(0);
      background-color: #0a6e56;
    }
  </style>
</head>
<body>

<h3>Export ChatGPT </h3>
<button id="export">Chat to PDF</button>

<script src="popup.js"></script>

</body>
</html>
